version: 1.1.5
cache: false

endpoints:
  custom:
    - name: "OpenRouter"
      apiKey: "${OPENROUTER_KEY}"
      baseURL: "https://openrouter.ai/api/v1"
      models:
        fetch: true
      titleConvo: true
      titleModel: "current_model"
      summarize: false
      summaryModel: "current_model"
      modelDisplayLabel: "OpenRouter"

    - name: "NanoGPT"
      apiKey: "${NANO_GPT_API_KEY}"
      baseURL: "https://nano-gpt.com/api/v1/"
      models:
        default: ["openai/gpt-5.2", "anthropic/claude-opus-4.5", "google/gemini-3-flash-preview", "moonshotai/kimi-k2.5:thinking"]
        fetch: true
      addParams:
        reasoning_content_compat: true
      titleConvo: true
      titleModel: "openai/gpt-5.2"
      modelDisplayLabel: "NanoGPT"
      iconURL: "https://nano-gpt.com/logo.png"

interface:
  memories: true

memory:
  disabled: false
  personalize: true
  tokenLimit: 1200
  messageWindowSize: 4
  validKeys:
    - "user_preferences"
    - "conversation_context"
    - "learned_facts"
  agent:
    provider: "OpenRouter"
    model: "openai/gpt-4.1-mini"
