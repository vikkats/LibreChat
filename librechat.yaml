version: 1.0.9

cache: true

endpoints:
  custom:
    - name: "OpenRouter"
      apiKey: "${OPENROUTER_KEY}"
      baseURL: "https://openrouter.ai/api/v1"
      models:
        fetch: true
      titleConvo: true
      titleModel: "current_model"
      summarize: false
      summaryModel: "current_model"
      modelDisplayLabel: "OpenRouter"

interface:
  memories: true

memory:
  disabled: false
  personalize: true
  tokenLimit: 1200
  messageWindowSize: 4
  validKeys:
    - "user_preferences"
    - "conversation_context"
    - "learned_facts"
  agent:
    provider: "OpenRouter"
    model: "openai/gpt-4.1-mini"
